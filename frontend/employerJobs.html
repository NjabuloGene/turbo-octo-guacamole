<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jobs · AgentHelper.Source</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="helper.css">
    <style>
        .my-jobs-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .post-job-btn {
            padding: 0.75rem 1.5rem;
        }
        .job-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .job-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
        }
        .job-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-open { background: #dbeafe; color: #1e40af; }
        .status-in_progress { background: #fef3c7; color: #b45309; }
        .status-completed { background: #dcfce7; color: #15803d; }
        .status-closed { background: #fee2e2; color: #b91c1c; }
        .job-stats {
            display: flex;
            gap: 1rem;
            margin: 0.75rem 0;
            font-size: 0.85rem;
            color: var(--ink-muted);
        }
        .applications-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .application-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg);
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
        }
        .applicant-name {
            font-weight: 600;
        }
        .application-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">HELPER<span>.</span>request</a>
            <ul class="nav-links" id="navLinks"></ul>
            <div class="nav-actions"></div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <div class="my-jobs-container">
        <div class="header-actions">
            <h1 style="font-family: var(--font-display);">My Jobs</h1>
            <button class="btn-primary post-job-btn" onclick="window.location.href='post-job.html'">+ Post New Job</button>
        </div>

        <div id="jobsList" class="jobs-list">
            <div class="loading-state"><div class="loading-spinner"></div><p>Loading your jobs...</p></div>
        </div>
    </div>

    <footer>
        <div class="footer-logo">HELPER<span style="color:var(--teal)">.</span>request</div>
        <p>Get whom you need, when you need them.<br>Anywhere in South Africa.</p>
        <hr class="footer-divider">
        <p class="copyright">&copy; 2025 HELPER.request — All rights reserved.</p>
    </footer>

    <script src="navbar.js"></script>
    <script src="my-jobs.js"></script>
</body>
</html>
